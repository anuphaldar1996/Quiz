<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathMaster - Free Math Practice & Premium Exams</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">📘 MathMaster</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Exams</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
            <div class="user-menu" id="userMenu">
                <div class="loading-spinner" style="width: 1.5rem; height: 1.5rem;"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Error Alert -->
        <div id="globalError" class="alert alert-error hidden"></div>
        
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center mt-8">
            <div class="loading-spinner"></div>
            <p class="mt-4">Loading exams...</p>
        </div>

        <!-- Exams Grid -->
        <div id="examsContainer" class="hidden">
            <h1 class="section-title">📋 Mathematics Exams</h1>
            <p class="section-desc">Free topics available for everyone. Premium exams require purchase.</p>
            
            <div id="examsGrid" class="grid"></div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Load and display exams
        async function loadExams() {
            try {
                LoadingState.show();
                
                const exams = await getExams();
                const user = auth.currentUser;
                let purchases = [];
                
                if (user) {
                    purchases = await getUserPurchases(user.uid);
                }
                
                displayExams(exams, purchases);
                
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('examsContainer').classList.remove('hidden');
            } catch (error) {
                ErrorHandler.handle(error, 'loadExams');
            } finally {
                LoadingState.hide();
            }
        }
        
        function displayExams(exams, purchases) {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '';
            
            exams.forEach(exam => {
                const isFree = exam.price === 0;
                const isPurchased = purchases.includes(exam.id);
                const canAccess = isFree || isPurchased;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="price-tag ${isFree ? 'free' : ''}">
                        💰 ${isFree ? 'Free' : formatCurrency(exam.price)}
                    </div>
                    <h3>${exam.name}</h3>
                    <p>${exam.description || 'Practice your skills with topic-wise questions.'}</p>
                    <div class="action-area">
                        <span class="${isFree ? 'free-badge' : (isPurchased ? 'purchased-badge' : 'premium-badge')}">
                            ${isFree ? '✨ Free Access' : (isPurchased ? '✔ Purchased' : '🔒 Premium')}
                        </span>
                        ${canAccess ? 
                            `<button class="btn btn-primary" onclick="window.location.href='exam.html?id=${exam.id}'">Enter Exam</button>` :
                            (user ? 
                                `<button class="btn btn-secondary" onclick="showPurchaseModal('${exam.id}')">Purchase</button>` :
                                `<a href="auth.html?redirect=exam.html%3Fid%3D${exam.id}" class="btn btn-secondary">Login to Buy</a>`)
                        }
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', loadExams);
    </script>
</body>
</html>
